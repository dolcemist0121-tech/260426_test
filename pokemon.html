<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ポケモンずかん</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      margin-bottom: 32px;
      color: #f0d060;
      text-shadow: 0 0 20px rgba(240, 208, 96, 0.4);
    }

    #catch-btn {
      background: linear-gradient(135deg, #e63946, #c1121f);
      color: #fff;
      border: none;
      border-radius: 50px;
      padding: 16px 40px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
      box-shadow: 0 4px 20px rgba(230, 57, 70, 0.5);
      letter-spacing: 0.03em;
    }

    #catch-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(230, 57, 70, 0.65);
    }

    #catch-btn:active:not(:disabled) {
      transform: translateY(0);
    }

    #catch-btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    /* Spinner */
    .spinner {
      width: 48px;
      height: 48px;
      border: 5px solid rgba(255,255,255,0.15);
      border-top-color: #f0d060;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 40px auto;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Card */
    #card {
      margin-top: 40px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 32px 40px;
      text-align: center;
      width: 100%;
      max-width: 340px;
      backdrop-filter: blur(8px);
      display: none;
    }

    #card.visible {
      display: block;
      animation: fadeSlideUp 0.35s ease-out both;
    }

    @keyframes fadeSlideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    #pokemon-img {
      width: 200px;
      height: 200px;
      object-fit: contain;
      image-rendering: pixelated;
      filter: drop-shadow(0 4px 16px rgba(0,0,0,0.4));
    }

    #pokemon-id {
      font-size: 0.85rem;
      color: #888;
      margin-top: 8px;
    }

    #pokemon-name {
      font-size: 1.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-top: 4px;
      color: #fff;
    }

    #types {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-top: 14px;
      flex-wrap: wrap;
    }

    .type-badge {
      padding: 4px 16px;
      border-radius: 50px;
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #fff;
    }

    #error-msg {
      margin-top: 24px;
      color: #e63946;
      font-size: 0.95rem;
      display: none;
    }
  </style>
</head>
<body>
  <h1>ポケモンずかん</h1>
  <button id="catch-btn">クリックしてポケモンを出現！</button>

  <div id="loading" style="display:none;"><div class="spinner"></div></div>

  <div id="card">
    <img id="pokemon-img" src="" alt="">
    <p id="pokemon-id"></p>
    <p id="pokemon-name"></p>
    <div id="types"></div>
  </div>

  <p id="error-msg">エラーが発生しました。もう一度お試しください。</p>

  <script>
    const TYPE_COLORS = {
      normal: '#A8A878', fire: '#F08030', water: '#6890F0',
      electric: '#F8D030', grass: '#78C850', ice: '#98D8D8',
      fighting: '#C03028', poison: '#A040A0', ground: '#E0C068',
      flying: '#A890F0', psychic: '#F85888', bug: '#A8B820',
      rock: '#B8A038', ghost: '#705898', dragon: '#7038F8',
      dark: '#705848', steel: '#B8B8D0', fairy: '#EE99AC',
    };

    const btn = document.getElementById('catch-btn');
    const card = document.getElementById('card');
    const loading = document.getElementById('loading');
    const errorMsg = document.getElementById('error-msg');

    btn.addEventListener('click', fetchPokemon);

    async function fetchPokemon() {
      btn.disabled = true;
      card.classList.remove('visible');
      card.style.display = 'none';
      errorMsg.style.display = 'none';
      loading.style.display = 'block';

      try {
        const id = Math.floor(Math.random() * 1025) + 1;
        const res = await fetch(`https://pokeapi.co/api/v2/pokemon/${id}`);
        if (!res.ok) throw new Error('fetch failed');
        const data = await res.json();

        const img = data.sprites?.other?.['official-artwork']?.front_default
          || data.sprites?.front_default
          || '';

        document.getElementById('pokemon-img').src = img;
        document.getElementById('pokemon-img').alt = data.name;
        document.getElementById('pokemon-id').textContent = `No. ${String(id).padStart(4, '0')}`;
        document.getElementById('pokemon-name').textContent = data.name;

        const typesEl = document.getElementById('types');
        typesEl.innerHTML = '';
        data.types.forEach(({ type }) => {
          const badge = document.createElement('span');
          badge.className = 'type-badge';
          badge.textContent = type.name;
          badge.style.background = TYPE_COLORS[type.name] || '#888';
          typesEl.appendChild(badge);
        });

        loading.style.display = 'none';
        card.classList.remove('visible');
        void card.offsetWidth; // reflow to re-trigger animation
        card.classList.add('visible');
      } catch {
        loading.style.display = 'none';
        errorMsg.style.display = 'block';
      } finally {
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
