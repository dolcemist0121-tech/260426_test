<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>タイマー</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    h1 {
      font-size: 1.2rem;
      font-weight: 400;
      letter-spacing: 0.2em;
      color: #888;
      margin-bottom: 2rem;
      text-transform: uppercase;
    }

    .timer-display {
      font-size: 6rem;
      font-weight: 200;
      letter-spacing: 0.05em;
      font-variant-numeric: tabular-nums;
      color: #fff;
      margin-bottom: 2.5rem;
      transition: color 0.3s;
    }

    .timer-display.warning {
      color: #f39c12;
    }

    .timer-display.danger {
      color: #e74c3c;
    }

    .progress-bar {
      width: 320px;
      height: 4px;
      background: #333;
      border-radius: 2px;
      margin-bottom: 2.5rem;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #6c63ff, #a78bfa);
      border-radius: 2px;
      width: 100%;
      transition: width 1s linear, background-color 0.3s;
    }

    .progress-fill.warning {
      background: linear-gradient(90deg, #f39c12, #f1c40f);
    }

    .progress-fill.danger {
      background: linear-gradient(90deg, #e74c3c, #c0392b);
    }

    .preset-buttons {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 2rem;
    }

    .preset-btn {
      padding: 0.4rem 1rem;
      border: 1px solid #444;
      background: transparent;
      color: #aaa;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.2s;
    }

    .preset-btn:hover {
      border-color: #6c63ff;
      color: #fff;
    }

    .custom-input {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 2rem;
    }

    .time-field {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.3rem;
    }

    .time-field label {
      font-size: 0.7rem;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .time-field input {
      width: 64px;
      padding: 0.5rem;
      background: #2a2a4a;
      border: 1px solid #444;
      border-radius: 8px;
      color: #fff;
      font-size: 1.2rem;
      text-align: center;
      outline: none;
      transition: border-color 0.2s;
    }

    .time-field input:focus {
      border-color: #6c63ff;
    }

    .time-sep {
      font-size: 1.5rem;
      color: #555;
      margin-top: 1.2rem;
    }

    .controls {
      display: flex;
      gap: 1rem;
    }

    button.btn {
      padding: 0.75rem 2rem;
      border: none;
      border-radius: 50px;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.2s;
      font-weight: 500;
    }

    .btn-primary {
      background: #6c63ff;
      color: #fff;
      min-width: 120px;
    }

    .btn-primary:hover {
      background: #7c73ff;
      transform: translateY(-1px);
    }

    .btn-secondary {
      background: #2a2a4a;
      color: #aaa;
      border: 1px solid #444;
    }

    .btn-secondary:hover {
      background: #333360;
      color: #fff;
    }

    .finished-msg {
      display: none;
      font-size: 1.5rem;
      color: #6c63ff;
      margin-bottom: 1rem;
      animation: pulse 1s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
  </style>
</head>
<body>
  <h1>Timer</h1>

  <div class="timer-display" id="display">00:00</div>

  <div class="progress-bar">
    <div class="progress-fill" id="progressFill"></div>
  </div>

  <div class="finished-msg" id="finishedMsg">⏰ 時間です！</div>

  <div class="preset-buttons">
    <button class="preset-btn" onclick="setPreset(1)">1分</button>
    <button class="preset-btn" onclick="setPreset(3)">3分</button>
    <button class="preset-btn" onclick="setPreset(5)">5分</button>
    <button class="preset-btn" onclick="setPreset(10)">10分</button>
    <button class="preset-btn" onclick="setPreset(25)">25分</button>
  </div>

  <div class="custom-input">
    <div class="time-field">
      <label>分</label>
      <input type="number" id="inputMin" min="0" max="99" value="5" oninput="syncFromInput()">
    </div>
    <span class="time-sep">:</span>
    <div class="time-field">
      <label>秒</label>
      <input type="number" id="inputSec" min="0" max="59" value="0" oninput="syncFromInput()">
    </div>
  </div>

  <div class="controls">
    <button class="btn btn-primary" id="startBtn" onclick="toggleTimer()">スタート</button>
    <button class="btn btn-secondary" onclick="resetTimer()">リセット</button>
  </div>

  <script>
    let totalSeconds = 5 * 60;
    let remaining = totalSeconds;
    let interval = null;
    let running = false;

    const display = document.getElementById('display');
    const progressFill = document.getElementById('progressFill');
    const startBtn = document.getElementById('startBtn');
    const finishedMsg = document.getElementById('finishedMsg');

    function pad(n) {
      return String(n).padStart(2, '0');
    }

    function updateDisplay() {
      const m = Math.floor(remaining / 60);
      const s = remaining % 60;
      display.textContent = `${pad(m)}:${pad(s)}`;

      const ratio = totalSeconds > 0 ? remaining / totalSeconds : 1;
      progressFill.style.width = (ratio * 100) + '%';

      display.className = 'timer-display';
      progressFill.className = 'progress-fill';

      if (ratio <= 0.1) {
        display.classList.add('danger');
        progressFill.classList.add('danger');
      } else if (ratio <= 0.25) {
        display.classList.add('warning');
        progressFill.classList.add('warning');
      }
    }

    function toggleTimer() {
      if (remaining === 0) return;
      if (running) {
        clearInterval(interval);
        running = false;
        startBtn.textContent = 'スタート';
      } else {
        finishedMsg.style.display = 'none';
        running = true;
        startBtn.textContent = '一時停止';
        interval = setInterval(() => {
          remaining--;
          updateDisplay();
          if (remaining === 0) {
            clearInterval(interval);
            running = false;
            startBtn.textContent = 'スタート';
            finishedMsg.style.display = 'block';
            playBeep();
          }
        }, 1000);
      }
    }

    function resetTimer() {
      clearInterval(interval);
      running = false;
      remaining = totalSeconds;
      startBtn.textContent = 'スタート';
      finishedMsg.style.display = 'none';
      updateDisplay();
    }

    function setPreset(minutes) {
      clearInterval(interval);
      running = false;
      totalSeconds = minutes * 60;
      remaining = totalSeconds;
      document.getElementById('inputMin').value = minutes;
      document.getElementById('inputSec').value = 0;
      startBtn.textContent = 'スタート';
      finishedMsg.style.display = 'none';
      updateDisplay();
    }

    function syncFromInput() {
      const m = parseInt(document.getElementById('inputMin').value) || 0;
      const s = parseInt(document.getElementById('inputSec').value) || 0;
      totalSeconds = m * 60 + s;
      remaining = totalSeconds;
      clearInterval(interval);
      running = false;
      startBtn.textContent = 'スタート';
      finishedMsg.style.display = 'none';
      updateDisplay();
    }

    function playBeep() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        [0, 0.3, 0.6].forEach(offset => {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.frequency.value = 880;
          osc.type = 'sine';
          gain.gain.setValueAtTime(0.4, ctx.currentTime + offset);
          gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + offset + 0.25);
          osc.start(ctx.currentTime + offset);
          osc.stop(ctx.currentTime + offset + 0.3);
        });
      } catch (e) {}
    }

    updateDisplay();
  </script>
</body>
</html>
